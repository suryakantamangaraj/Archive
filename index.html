<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive Projects | Surya Raj - suryaraj.com</title>
    <meta name="description" content="Archive of past projects, discontinued works, and retroactive portfolio pieces by Surya Raj. Explore older web experiments including Smart Farming and legacy personal sites.">
    <meta name="keywords" content="Surya Raj, Archive, Portfolio, Legacy Projects, Smart Farming, Web Development">
    <meta name="author" content="Surya Raj">
    <meta name="robots" content="index, follow">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://archive.suryaraj.com/">
    <meta property="og:title" content="Archive Projects | Surya Raj">
    <meta property="og:description" content="Archive of past projects, discontinued works, and retroactive portfolio pieces by Surya Raj.">
    <meta property="og:image" content="https://suryaraj.com/assets/og-image.jpg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://archive.suryaraj.com/">
    <meta property="twitter:title" content="Archive Projects | Surya Raj">
    <meta property="twitter:description" content="Archive of past projects, discontinued works, and retroactive portfolio pieces by Surya Raj.">
    <meta property="twitter:image" content="https://suryaraj.com/assets/og-image.jpg">

    <link rel="canonical" href="https://archive.suryaraj.com/">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Surya Raj Project Archives",
      "url": "https://archive.suryaraj.com/",
      "author": {
        "@type": "Person",
        "name": "Surya Raj",
        "url": "https://suryaraj.com"
      },
      "description": "Archive of past projects, discontinued works, and retroactive portfolio pieces by Surya Raj."
    }
    </script>
</head>

<body class="retro">
    <!-- CRT Effect Overlay -->
    <div class="crt-overlay"></div>

    <!-- Navigation -->
    <nav class="top-nav">
        <div class="nav-left">
            <a href="/" class="site-title"><span class="archive-text">> SURYA STASH</span></a>
        </div>
        <div class="nav-right">
            <div class="terminal-search">
                <span class="prompt">🔍</span>
                <input type="search" id="searchProjects" placeholder="search archives..." autocomplete="off">
            </div>
            <a href="https://suryaraj.com" class="personal-link" target="_blank">🔗suryaraj.com^</a>
            <button id="theme-switch" class="theme-btn" aria-label="Toggle theme">
                <i class="fas fa-sun light-icon"></i>
                <i class="fas fa-moon dark-icon"></i>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="projects-container">
        <div class="projects-welcome">
            Welcome to the archives. Below are the discontinued projects.
        </div>
        <div class="content-wrapper">
            <div class="projects-grid" id="projectsGrid">
                <!-- Projects will be dynamically inserted here -->
            </div>
            <aside class="filter-sidebar">
                <div class="filter-section">
                    <h3>> Filter By Date</h3>
                    <div id="dateFilters" class="filter-options">
                        <input type="number" id="yearFilter" min="2018" max="2024" placeholder="Enter year...">
                    </div>
                </div>
                <div class="filter-section">
                    <h3>> Filter By Status</h3>
                    <div id="statusFilters" class="filter-options">
                        <!-- Status options will be dynamically inserted -->
                    </div>
                </div>
                <div class="filter-section">
                    <h3>> Filter By Tags</h3>
                    <div id="tagFilters" class="filter-options">
                        <!-- Tags will be dynamically inserted -->
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <!-- Footer -->
    <footer class="retro-footer">
        <div class="footer-content">
            <p class="terminal-text">[RETRO_RELICS] © 2024-<span id="currentYear"></span> Surya Raj . Preserved with
                Care 📚 by Surya</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="script.js" type="module"></script>
</body>

</html>
